name: CI

# Run checks on pull requests, pushes to main branches, and manual dispatch.
on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    name: Compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Python 3.11 matches the expected modern FastAPI/Pydantic runtime.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Compile importable modules first so syntax/import regressions fail clearly.
      - name: Compile deployment modules
        run: |
          python -m py_compile \
            src/api.py \
            src/finetuning.py \
            src/groq_diagnosis.py \
            src/inference_flan_t5.py \
            src/pcap_analysis.py \
            scripts/inference_trt_llm.py \
            scripts/merge_flan_t5_lora.py

      - name: Run tests
        run: python -m pytest -q
